<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineList - Catálogo de Filmes</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="main-header">
        <h1>CineList</h1>
        <p>Seu acervo pessoal de cinema</p>
    </header>

    <main class="container">
        <section id="app">
            <form id="filme-form" class="movie-form">
                <div class="input-group">
                    <label for="titulo">Título do Filme</label>
                    <input type="text" id="titulo" placeholder="Ex: Interestelar" required>
                </div>

                <div class="input-group">
                    <label for="sinopse">Sinopse</label>
                    <textarea id="sinopse" placeholder="Resumo do filme..." required></textarea>
                </div>

                <div class="input-group">
                    <label for="poster-url">URL do Pôster</label>
                    <input type="url" id="poster-url" placeholder="https://link-da-imagem.jpg" required>
                </div>

                <button type="submit" id="btn-adicionar">Adicionar à Lista</button>
            </form>

            <ul id="lista-filmes" class="movie-list"></ul>
        </section>
    </main>

    <script src="assets/js/script.js"></script>
</body>
</html>
