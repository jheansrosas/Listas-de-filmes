<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas de filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-200 font-sans">
    <header class="bg-gray-800 py-6 mb-4 rounded-lg">
        <div class="max-w-screen-xl mx-auto px-5">
            <h1 class="text-3xl font-bold text-white text-center mb-2">Listas de filmes</h1>
            <nav>

            </nav>
        </div>
    </header>

    <div class="max-w-screen-xl mx-auto px-5 mb-8">
        <input type="text" name="filme-busca" id="filme-busca" placeholder="Buscar filmes..." class="p-3 w-full rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="max-w-screen-xl mx-auto px-5 mb-8 bg-gray-800 p-6 rounded-lg shadow-lg">
        <h3 class="text-xl font-bold mb-4 text-center text-white">Adicionar Novo Filme</h3>
        <div id="form-adicionar" class="space-y-4">
            <div>
                <label for="titulo" class="block text-gray-400 text-sm font-medium mb-1">Título do Filme</label>
                <input type="text" name="titulo" id="titulo" placeholder="Ex: Vingadores: Ultimato" class="w-full p-2 bg-gray-700 text-white rounded-md border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="sinopse" class="block text-gray-400 text-sm font-medium mb-1">Sinopse</label>
                <textarea name="sinopse" id="sinopse" placeholder="A sinopse do filme..." rows="3" class="w-full p-2 bg-gray-700 text-white rounded-md border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            <div>
                <label for="poster-url" class="block text-gray-400 text-sm font-medium mb-1">URL da Imagem do Poster</label>
                <input type="url" name="poster-url" id="poster-url" placeholder="http://exemplo.com/poster.jpg" class="w-full p-2 bg-gray-700 text-white rounded-md border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button id="btn-adicionar" class="w-full bg-blue-600 text-white p-2 rounded-md font-bold hover:bg-blue-700 transition-colors">Adicionar Filme</button>
        </div>
    </div>

    <div class="max-w-screen-xl mx-auto px-5 mb-8">
        <ul class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </ul>
    </div>

    <div id="modal-edicao" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 p-6 rounded-lg shadow-lg w-full max-w-lg">
            <h3 class="text-xl font-bold mb-4 text-center">Editar Filme</h3>
            <div class="space-y-4">
                <div>
                    <label for="edit-titulo" class="block text-gray-400 text-sm font-medium mb-1">Título do Filme</label>
                    <input type="text" id="edit-titulo" class="w-full p-2 bg-gray-700 text-white rounded-md border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="edit-sinopse" class="block text-gray-400 text-sm font-medium mb-1">Sinopse</label>
                    <textarea id="edit-sinopse" rows="3" class="w-full p-2 bg-gray-700 text-white rounded-md border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div>
                    <label for="edit-poster-url" class="block text-gray-400 text-sm font-medium mb-1">URL da Imagem do Poster</label>
                    <input type="url" id="edit-poster-url" class="w-full p-2 bg-gray-700 text-white rounded-md border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex justify-end space-x-4 mt-4">
                    <button id="btn-salvar-edicao" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-full">Salvar</button>
                    <button id="btn-cancelar-edicao" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-full">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-800 py-6 mt-10 rounded-lg">
        <div class="max-w-screen-xl mx-auto px-5 text-center text-gray-400">
            <p>&copy; 2025 Seu Nome. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
